{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>「 ✦ Recuperar Contraseña ✦ 」</title>

    <style>
        body {
            background-image: url("{% static 'img/fondo2.jpg' %}");
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            background: linear-gradient(135deg, rgba(140, 0, 255, 0.45), rgba(255, 0, 200, 0.45));
            padding: 35px;
            border-radius: 20px;
            width: 360px;
            color: white;
            backdrop-filter: blur(12px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
            margin-bottom: 8px;
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            color: white;
            text-align: center;
            background: linear-gradient(45deg, #8c00ff, #ff00c8);
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .message {
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: bold;
        }

        .error {
            color: #ffcccc;
        }

        .success {
            color: #ccffcc;
        }
    </style>
    <link rel="stylesheet" href="{% static 'css/glassmorphism.css' %}">
</head>

<body>

<div class="container">
    <h2>Recuperar Contraseña</h2>

    <!-- MENSAJES -->
    {% if messages %}
        {% for message in messages %}
            <div class="message 
                {% if message.tags == 'error' %}error{% endif %}
                {% if message.tags == 'success' %}success{% endif %}
            ">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    {% if not usuario %}
    <!-- PASO 1: INGRESAR CORREO -->
    <form method="POST">
        {% csrf_token %}

        <label>Correo registrado</label>
        <input type="email" name="email" required>

        <div class="btn-group">
            <button type="submit" class="btn">
                Continuar
            </button>

            <a href="{% url 'login' %}" class="btn">
                Volver
            </a>
        </div>
    </form>

    {% else %}
    <!-- PASO 2: RESPONDER PREGUNTA -->

    <form method="POST">
        {% csrf_token %}

        <!-- reenviamos el email oculto -->
        <input type="hidden" name="email" value="{{ usuario.email }}">

        <label>Pregunta de Seguridad</label>
        <input type="text" value="{{ usuario.get_pregunta_seguridad_display }}" disabled>

        <label>Respuesta</label>
        <input type="text" name="respuesta_seguridad" required>

        <label>Nueva Contraseña</label>
        <input type="password" name="nueva_password" required>

        <div class="btn-group">
            <button type="submit" class="btn">
                Cambiar
            </button>

            <a href="{% url 'login' %}" class="btn">
                Cancelar
            </a>
        </div>
    </form>

    {% endif %}

</div>

</body>
</html>
