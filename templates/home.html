{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Home</title>

    <style>
        body{
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-image: url("{% static 'img/fondo2.jpg' %}");
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ===== NAVBAR ===== */
        .navbar{
            width: 80%;
            margin: 20px auto 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .navbar h2{
            color: white;
            margin: 0;
            font-size: 22px;
            font-weight: 600;
        }

        .nav-buttons{
            display: flex;
            gap: 15px;
        }

        .nav-buttons a{
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            background: rgba(255,255,255,0.2);
            color: white;
            transition: 0.3s;
        }

        .nav-buttons a:hover{
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }

        /* ===== CONTENIDO CENTRAL ===== */
        .container{
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .box{
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 60px;
            border-radius: 20px;
            text-align: center;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* ===== TEXTO SECRETO ABAJO DERECHA ===== */
        .secret-link{
            position: absolute;
            bottom: 20px;
            right: 25px;
            font-size: 15px;
            color: #ffb6d9; /* rosado suave */
            text-decoration: none;
            transition: 0.3s;
        }

        .secret-link:hover{
            color: #ff69b4;
            text-decoration: underline;
        }

    </style>
    <link rel="stylesheet" href="{% static 'css/glassmorphism.css' %}">
</head>

<body>

    <div class="navbar">
        <h2>Proyecto Contabilidad</h2>

        <div class="nav-buttons">
            <a href="{% url 'login' %}">Iniciar Sesión</a>
            <a href="{% url 'register' %}">Registrarse</a>
        </div>
    </div>

    <div class="container">
        <div class="box">
            <h1>Bienvenido</h1>
            <p>Gestiona tu sistema contable de forma rápida y segura.</p>
        </div>
    </div>

    <!-- TEXTO SECRETO -->
    <a href="{% url 'meme' %}" class="secret-link">
        Solo hacer click si es el Inge
    </a>

</body>
</html>
