{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>「 ✦ Iniciar Sesion ✦ 」</title>

    <style>
        body {
            background-image: url("{% static 'img/fondo2.jpg' %}");
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            background: linear-gradient(135deg, rgba(140, 0, 255, 0.45), rgba(255, 0, 200, 0.45));
            padding: 35px;
            border-radius: 20px;
            width: 360px;
            color: white;
            backdrop-filter: blur(12px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: normal;
        }

        label {
            font-size: 14px;
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
            margin-bottom: 8px;
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 20px;
            border: none;
            font-weight: normal;      /* 👈 sin negrilla */
            font-size: 14px;          /* 👈 mismo tamaño */
            font-family: Arial, sans-serif;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            color: white;
            text-align: center;
            background: linear-gradient(45deg, #8c00ff, #ff00c8);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button.btn {
            appearance: none;
            -webkit-appearance: none;
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .message {
            background-color: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 10px;
            text-align: center;
            font-size: 14px;
        }

        /* 🔥 LINKS FUERA DEL CUADRO */
        .outside-links {
            margin-top: 20px;
            text-align: center;
        }

        .outside-links a {
            display: block;
            color: white;
            font-size: 14px;
            text-decoration: underline;
            margin-top: 8px;
        }

        .outside-links a:hover {
            opacity: 0.8;
        }
    </style>
    <link rel="stylesheet" href="{% static 'css/glassmorphism.css' %}">
</head>

<body>

<div class="container">
    <h2>Login</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="message">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Usuario</label>
        <input type="text" name="username">

        <label>Contraseña</label>
        <input type="password" name="password">

        <div class="btn-group">
            <button type="submit" class="btn">
                Iniciar Sesión
            </button>

            <a href="{% url 'home' %}" class="btn">
                Volver al Inicio
            </a>
        </div>

    </form>
</div>

<!-- 🔥 FUERA DEL CUADRO -->
<div class="outside-links">
    <a href="{% url 'password_reset' %}">
        ¿Olvidaste la contraseña?
    </a>

    <a href="{% url 'register' %}">
        Registrarse
    </a>
</div>

</body>
</html>
