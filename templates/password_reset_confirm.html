{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Nueva contraseña</title>
<style>
body {
    background-image: url("{% static 'img/fondo2.jpg' %}");
    background-size: cover;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family: Arial;
}

.box {
    width:400px;
    padding:40px;
    border-radius:20px;
    background: linear-gradient(145deg,#a855f7,#ec4899);
    backdrop-filter: blur(8px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    color:white;
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
}

button {
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    background:white;
    color:#a855f7;
    font-weight:bold;
    cursor:pointer;
}
</style>
    <link rel="stylesheet" href="{% static 'css/glassmorphism.css' %}">
</head>
<body>

<div class="box">
<h2>Crear nueva contraseña</h2>

<form method="POST">
{% csrf_token %}
{{ form.new_password1.label_tag }}
{{ form.new_password1 }}
{{ form.new_password2.label_tag }}
{{ form.new_password2 }}
<button type="submit">Cambiar contraseña</button>
</form>

</div>

</body>
</html>
